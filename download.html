<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download er@</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0D0D0D;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    color: #fff;
  }
  .logo {
    font-size: 52px;
    font-weight: 900;
    color: #6B5CE7;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }
  .tagline {
    font-size: 15px;
    color: #666;
    margin-bottom: 48px;
    text-align: center;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #6B5CE7;
    color: #fff;
    text-decoration: none;
    border-radius: 14px;
    padding: 16px 28px;
    font-size: 16px;
    font-weight: 700;
    width: 100%;
    max-width: 300px;
    margin-bottom: 14px;
    transition: background 0.2s;
  }
  .btn:hover { background: #534AB7; }
  .btn.secondary {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
  }
  .btn.secondary:hover { background: #222; }
  .btn svg { flex-shrink: 0; }
  .btn-text { display: flex; flex-direction: column; }
  .btn-sub { font-size: 10px; font-weight: 400; opacity: 0.7; }
  .btn-main { font-size: 15px; font-weight: 700; }
  .footer {
    margin-top: 48px;
    font-size: 11px;
    color: #333;
  }
  #auto-msg {
    font-size: 13px;
    color: #6B5CE7;
    margin-bottom: 24px;
    text-align: center;
    min-height: 20px;
  }
</style>
</head>
<body>

<div class="logo">er@</div>
<div class="tagline">Identity over performance. Privacy over profit.</div>

<div id="auto-msg"></div>

<a id="ios-btn" href="https://apps.apple.com/us/app/er/id6770107399" class="btn">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
  <div class="btn-text">
    <span class="btn-sub">Download on the</span>

  </div>
</a>

<a id="android-btn" href="https://play.google.com/store/apps/details?id=com.artyfishall.era" class="btn secondary">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M3.18 23.76c.3.17.64.22.98.15l12.08-6.98-2.54-2.54-10.52 9.37zm-1.76-20.4C1.16 3.67 1 4.1 1 4.58v14.84c0 .48.16.91.42 1.22l.07.06 8.31-8.31v-.2L1.49 3.88l-.07.08zM20.23 10.3l-2.78-1.6-2.84 2.84 2.84 2.84 2.8-1.62c.8-.46.8-1.2-.02-1.46zM4.17.48l12.08 6.98-2.54 2.54L3.19.63C3.52.4 3.87.31 4.17.48z"/></svg>

    <span class="btn-sub">Get it on</span>
    <span class="btn-main">Google Play</span>
  </div>
</a>

<div class="footer">eravibe.app</div>

<script>
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /android/i.test(ua);

  if (isIOS) {
    document.getElementById('auto-msg').textContent = 'Taking you to the App Store…';
    setTimeout(() => {
      window.location.href = 'https://apps.apple.com/us/app/er/id6770107399';
    }, 800);
  } else if (isAndroid) {
    document.getElementById('auto-msg').textContent = 'Taking you to Google Play…';
    setTimeout(() => {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.artyfishall.era';
    }, 800);
  }
  // Desktop: just shows both buttons, no auto-redirect
</script>

</html>
